{% extends "base.html" %}
{% load i18n %}
{% block head_title %}
    {% translate "Change Email" %}
{% endblock head_title %}
{% block content %}
<div class="container mt-5">
    <h1>{% translate "Change Email" %}</h1>
    <form method="post" action="{% url 'account_email_change' %}">
        {% csrf_token %}
        <div class="form-group">
            <label for="email">{% translate "New Email Address" %}:</label>
            <input type="email" class="form-control" id="email" name="email" required>
        </div>
        <button type="submit" class="btn btn-primary mt-3">{% translate "Change Email" %}</button>
    </form>
</div>
{% endblock content %}
