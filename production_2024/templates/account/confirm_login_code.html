{% extends "base.html" %}
{% load i18n %}
{% block head_title %}
    {% translate "Confirm Login Code" %}
{% endblock head_title %}
{% block content %}
<div class="container mt-5">
    <h1>{% translate "Confirm Login Code" %}</h1>
    <form method="post" action="{% url 'account_confirm_login_code' %}">
        {% csrf_token %}
        <div class="form-group">
            <label for="code">{% translate "Login Code" %}:</label>
            <input type="text" class="form-control" id="code" name="code" required>
        </div>
        <button type="submit" class="btn btn-primary mt-3">{% translate "Confirm" %}</button>
    </form>
</div>
{% endblock content %}
