{% extends "base.html" %}
{% load i18n %}
{% block head_title %}
    {% translate "Logout" %}
{% endblock head_title %}
{% block content %}
<div class="container mt-5">
    <h1>{% translate "Logout" %}</h1>
    <form method="post" action="{% url 'account_logout' %}">
        {% csrf_token %}
        <button type="submit" class="btn btn-primary mt-3">{% translate "Confirm Logout" %}</button>
    </form>
</div>
{% endblock content %}
