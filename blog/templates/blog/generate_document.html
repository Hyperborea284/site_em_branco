{% extends "base.html" %}
{% block content %}
<div class="container">
  <h2>Gerar Documento</h2>
  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-success">Gerar</button>
  </form>
  {% if result %}
  <div class="alert alert-info mt-3">
    <strong>Resultado:</strong> {{ result }}
  </div>
  {% endif %}
</div>
{% endblock %}
